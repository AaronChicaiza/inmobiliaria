
<style>
.login-wrap{
    width:100%;
    margin:50px auto;
    max-width:525px;
    min-height:600px;
    position:relative;
    
    background-size:cover;
    box-shadow:0 12px 15px 0 rgba(0,0,0,.24),
               0 17px 50px 0 rgba(0,0,0,.19);
}

.login-html{
    width:100%;
    height:100%;
    position:absolute;
    padding:90px 70px 50px 70px;
    background:rgba(40,57,101,.9);
}

.login-html h2{
    color:#fff;
    text-align:center;
    margin-bottom:40px;
}

.login-form .group{
    margin-bottom:20px;
}

.login-form .group .label{
    color:#fff;
    font-size:14px;
    margin-bottom:8px;
    display:block;
}

.login-form .group .input{
    width:100%;
    color:#fff;
    display:block;
    border:none;
    padding:15px 20px;
    border-radius:25px;
    background:rgba(255,255,255,.1);
}

.login-form .group .button{
    width:100%;
    border:none;
    padding:15px 20px;
    border-radius:25px;
    background:#1161ee;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.login-form .group .button:hover{
    background:#0d4dc7;
}

.error-box{
    background:#dc3545;
    color:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    margin-bottom:20px;
}

.hr{
    height:2px;
    margin:40px 0;
    background:rgba(255,255,255,.2);
}

.foot-lnk{
    text-align:center;
    color:white;
}
</style>

<div class="container">
    <div class="login-wrap">
        <div class="login-html">

            <h2>ACCR Inmobiliaria</h2>

            {% if error %}
                <div class="error-box">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="login-form">

                    <div class="group">
                        <label class="label">Usuario</label>
                        <input type="text"
                               name="username"
                               class="input"
                               placeholder="Ingrese su usuario"
                               required>
                    </div>

                    <div class="group">
                        <label class="label">Contraseña</label>
                        <input type="password"
                               name="password"
                               class="input"
                               placeholder="Ingrese su contraseña"
                               required>
                    </div>

                    <div class="group">
                        <button type="submit" class="button">
                            Iniciar Sesión
                        </button>
                    </div>

                    <div class="hr"></div>

                    <div class="foot-lnk">
                        Sistema de Gestión Inmobiliaria ACCR
                    </div>

                </div>
            </form>

        </div>
    </div>
</div>
