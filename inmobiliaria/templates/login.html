<h2>Login</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Usuario">
    <input type="password" name="password" placeholder="Contraseña">

    <button type="submit">Entrar</button>
</form>
