{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ACCR Inmobiliaria</title>
    <style>
        * { box-sizing: border-box; }

        body {
            /* cover hace que la imagen se estire para llenar toda la pantalla */
            background-image: url('{% static "images/accr.png" %}');
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        /* Capa oscura suave (0.3) para que el logo brille pero se lea el login */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); 
            z-index: -1;
        }

        .login-wrap {
            width: 100%;
            max-width: 450px;
            background: rgba(40, 57, 101, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 12px 15px 0 rgba(0,0,0,.3);
            margin: auto;
        }

        .login-wrap h2 { color: #fff; text-align: center; margin-bottom: 30px; margin-top: 0; }
        .group { margin-bottom: 20px; }
        .label { color: #fff; font-size: 14px; margin-bottom: 8px; display: block; }
        .input { width: 100%; padding: 15px 20px; border-radius: 25px; border: none; background: rgba(255,255,255,.1); color: #fff; }
        .button { width: 100%; padding: 15px; border-radius: 25px; border: none; background: #1161ee; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .button:hover { background: #0d4dc7; }
        .error-box { background: #dc3545; color: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .foot-lnk { text-align: center; color: white; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="login-wrap">
        <h2>ACCR Inmobiliaria</h2>
        
        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="group">
                <label class="label">Usuario</label>
                <input type="text" name="username" class="input" placeholder="Ingrese usuario" required>
            </div>
            <div class="group">
                <label class="label">Contraseña</label>
                <input type="password" name="password" class="input" placeholder="Ingrese contraseña" required>
            </div>
            <div class="group">
                <button type="submit" class="button">Iniciar Sesión</button>
            </div>
        </form>

        <div class="foot-lnk">Sistema de Gestión Inmobiliaria ACCR</div>
    </div>

</body>
</html>
