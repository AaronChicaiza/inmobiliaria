{% extends "./plantillaPrincipal.html" %}
{% load static %}

{% block contenido %}

<div class="container mt-4">

    <h2 class="mb-4">
        Editar Propiedad
    </h2>

    <form
        action="{% url 'actualizarPropiedad' %}"
        method="POST"
        enctype="multipart/form-data"
    >
        {% csrf_token %}

        <!-- ID oculto -->
        <input type="hidden" name="id" value="{{ propiedad.id }}">

        <div class="mb-3">
            <label>Dirección</label>
            <input
                type="text"
                class="form-control"
                name="direccion"
                value="{{ propiedad.direccion }}"
                required
            >
        </div>

        <div class="mb-3">
            <label>Tipo</label>
            <select class="form-control" name="tipo" required>
                <option value="Casa" {% if propiedad.tipo == "Casa" %}selected{% endif %}>Casa</option>
                <option value="Departamento" {% if propiedad.tipo == "Departamento" %}selected{% endif %}>Departamento</option>
                <option value="Local" {% if propiedad.tipo == "Local" %}selected{% endif %}>Local</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Operación</label>
            <select class="form-control" name="operacion" required>
                <option value="Renta" {% if propiedad.operacion == "Renta" %}selected{% endif %}>Renta</option>
                <option value="Venta" {% if propiedad.operacion == "Venta" %}selected{% endif %}>Venta</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Precio</label>
            <input
                type="number"
                step="0.01"
                class="form-control"
                name="precio"
                value="{{ propiedad.precio }}"
                required
            >
        </div>

        <div class="mb-3">
            <label>Fotografía actual</label><br>

            {% if propiedad.foto %}
                <img src="{{ propiedad.foto.url }}" width="200" class="mb-2 rounded">
            {% else %}
                <p>No hay imagen</p>
            {% endif %}
        </div>

        <div class="mb-3">
            <label>Cambiar fotografía (opcional)</label>
            <input
                type="file"
                class="form-control"
                name="foto"
                accept="image/*"
            >
        </div>

        <div class="form-check mb-3">
            <input
                class="form-check-input"
                type="checkbox"
                name="estacionamiento"
                id="estacionamiento"
                {% if propiedad.estacionamiento %}checked{% endif %}
            >

            <label class="form-check-label" for="estacionamiento">
                Tiene estacionamiento
            </label>
        </div>

        <button type="submit" class="btn btn-primary">
            Actualizar Propiedad
        </button>

    </form>

</div>

{% endblock %}
