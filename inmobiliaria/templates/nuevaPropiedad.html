{% extends "./plantillaPrincipal.html" %}
{% load static %}

{% block contenido %}

<div class="container mt-4">

    <h2 class="mb-4">
        Registrar Nueva Propiedad
    </h2>

    <form
        action="{% url 'guardarPropiedad' %}"
        method="POST"
        enctype="multipart/form-data"
    >
        {% csrf_token %}

        <div class="mb-3">
            <label>Dirección</label>
            <input
                type="text"
                class="form-control"
                name="direccion"
                required
            >
        </div>

        <div class="mb-3">
            <label>Tipo</label>
            <select
                class="form-control"
                name="tipo"
                required
            >
                <option value="">Seleccione</option>
                <option value="Casa">Casa</option>
                <option value="Departamento">Departamento</option>
                <option value="Local">Local</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Operación</label>
            <select
                class="form-control"
                name="operacion"
                required
            >
                <option value="">Seleccione</option>
                <option value="Renta">Renta</option>
                <option value="Venta">Venta</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Precio</label>
            <input
                type="number"
                step="0.01"
                class="form-control"
                name="precio"
                required
            >
        </div>

        <div class="mb-3">
            <label>Fotografía</label>
            <input
                type="file"
                class="form-control"
                name="foto"
                accept="image/*"
                required
            >
        </div>

        <div class="form-check mb-3">
            <input
                class="form-check-input"
                type="checkbox"
                name="estacionamiento"
                id="estacionamiento"
            >

            <label
                class="form-check-label"
                for="estacionamiento"
            >
                Tiene estacionamiento
            </label>
        </div>

        <button
            type="submit"
            class="btn btn-primary"
        >
            Guardar Propiedad
        </button>

    </form>

</div>

{% endblock %}
